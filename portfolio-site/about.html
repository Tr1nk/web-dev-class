<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">Abiral Ayer  </div>
        <div>
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="about.html">About me</a>
            <a href="contact.html">Contact me</a>
        </div>
    </nav>
    
    <main class="content-wrapper" style="padding: 50px; text-align: center;">
        <section class="about-intro">
            <h1>About Me</h1>
            <p>IT Student & Investor</p>
            
            <button id="view-cv-btn" class="btn" style="margin-top: 20px; background: #2196F3; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold;">
                CLICK HERE FOR CV
            </button>
        </section>

        <section id="resume-container" style="display: none; margin-top: 40px;">
            <h2>Resume</h2>
            <div class="resume-display">
                <embed src="resume.pdf" type="application/pdf" width="100%" height="800px" />
                <p style="margin-top: 15px;">
                    <a href="resume.pdf" download style="color: #e71017; font-weight: bold; text-decoration: none;">
                        Download CV
                    </a>
                </p>
            </div>
        </section>
    </main>

    <div class="clock-container">
        <div>Nepal (NPT): <span id="nepal-time" class="time-val"></span></div>
        <div>Your Time: <span id="local-time" class="time-val"></span></div>
    </div>

    <script src="script.js"></script>
